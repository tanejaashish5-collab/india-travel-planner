name: Nakshiq Autoposter

on:
  # ── 3x daily syncs (IST = UTC+5:30) ──────────────────────────────────────
  # 09:00 IST = 03:30 UTC  →  POSTS (first run of day)
  # 14:00 IST = 08:30 UTC  →  sync only
  # 19:00 IST = 13:30 UTC  →  sync only
  schedule:
    - cron: "30 3 * * *"   # 09:00 IST — publishes today's post
    - cron: "30 8 * * *"   # 14:00 IST — content sync only
    - cron: "30 13 * * *"  # 19:00 IST — content sync only

  # Manual trigger from GitHub Actions tab (for testing / force post)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - force
          - sync-only
          - dry-run

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Determine run mode ────────────────────────────────────────────────
      # Scheduled 03:30 UTC → normal (will post)
      # Scheduled 08:30 UTC → sync-only (already posted today)
      # Scheduled 13:30 UTC → sync-only
      # Manual → use workflow_dispatch input
      - name: Set run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "args=--${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "03" ]; then
            echo "args=" >> $GITHUB_OUTPUT
          else
            echo "args=--sync-only" >> $GITHUB_OUTPUT
          fi

      - name: Run autoposter
        env:
          OUTSTAND_API_KEY: ${{ secrets.OUTSTAND_API_KEY }}
        run: python autoposter.py ${{ steps.mode.outputs.args }}

      # ── Commit state.json + log back to repo ──────────────────────────────
      # This is how state persists between runs (what was posted, when)
      - name: Commit updated state
        run: |
          git config user.name  "Nakshiq Autoposter"
          git config user.email "autoposter@nakshiq.com"
          git add state.json autoposter.log
          git diff --staged --quiet || git commit -m "chore: autoposter state $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
