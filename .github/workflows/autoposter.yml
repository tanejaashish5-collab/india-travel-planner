name: Nakshiq Autoposter

on:
  schedule:
    - cron: "0 3 * * *"    # 08:30 IST
    - cron: "30 3 * * *"   # 09:00 IST  ← primary post window
    - cron: "0 4 * * *"    # 09:30 IST
    - cron: "30 4 * * *"   # 10:00 IST
    - cron: "0 5 * * *"    # 10:30 IST  ← last fallback
    - cron: "0 7 * * 2,4,6"    # 12:30 IST Tue/Thu/Sat — tourist map
    - cron: "0 9 * * *"       # 14:30 IST daily — canva visual
    - cron: "30 5 * * *"      # 11:00 IST daily — reel slot 1
    - cron: "30 10 * * *"     # 16:00 IST daily — reel slot 2
    - cron: "30 14 * * *"     # 20:00 IST daily — reel slot 3
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (leave blank for normal)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - force
          - sync-only
          - dry-run
          - tourist-map
          - tourist-map-force
          - canva-visual
          - canva-visual-force
          - reel
          - reel-force

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: nakshiq-autoposter/requirements.txt

      - name: Install ffmpeg (with drawtext/freetype support)
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release
          github-token: ${{ github.token }}

      - name: Install Python dependencies
        run: pip install -r nakshiq-autoposter/requirements.txt

      - name: Set run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          TOTAL_MINS=$((10#$HOUR * 60 + 10#$MINUTE))
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          INPUT="${{ github.event.inputs.mode }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$INPUT" = "tourist-map-force" ]; then
              echo "args=--tourist-map --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --tourist-map --force"
            elif [ "$INPUT" = "canva-visual-force" ]; then
              echo "args=--canva-visual --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --canva-visual --force"
            elif [ "$INPUT" = "reel-force" ]; then
              echo "args=--reel --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --reel --force"
            elif [ -n "$INPUT" ]; then
              echo "args=--${INPUT}" >> $GITHUB_OUTPUT
              echo "Manual mode: --${INPUT}"
            else
              echo "args=" >> $GITHUB_OUTPUT
              echo "Manual mode: normal (post)"
            fi
          elif [ "$TOTAL_MINS" -ge 540 ] && [ "$TOTAL_MINS" -lt 550 ]; then
            # UTC 09:00 daily → canva visual
            echo "args=--canva-visual" >> $GITHUB_OUTPUT
            echo "Scheduled CANVA VISUAL mode (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 420 ] && [ "$TOTAL_MINS" -lt 430 ] && echo "2 4 6" | grep -qw "$DOW"; then
            # UTC 07:00 on Tue/Thu/Sat → tourist map
            echo "args=--tourist-map" >> $GITHUB_OUTPUT
            echo "Scheduled TOURIST MAP mode (UTC ${HOUR}:${MINUTE}, DOW=${DOW})"
          elif [ "$TOTAL_MINS" -ge 330 ] && [ "$TOTAL_MINS" -lt 340 ]; then
            # UTC 05:30 (11:00 IST) → reel slot 1
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 1 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 630 ] && [ "$TOTAL_MINS" -lt 640 ]; then
            # UTC 10:30 (16:00 IST) → reel slot 2
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 2 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 870 ] && [ "$TOTAL_MINS" -lt 880 ]; then
            # UTC 14:30 (20:00 IST) → reel slot 3
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 3 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 180 ] && [ "$TOTAL_MINS" -le 330 ]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "Scheduled POST mode (UTC ${HOUR}:${MINUTE})"
          else
            echo "args=--sync-only" >> $GITHUB_OUTPUT
            echo "Scheduled SYNC mode (UTC ${HOUR}:${MINUTE})"
          fi

      - name: Run autoposter
        env:
          OUTSTAND_API_KEY: ${{ secrets.OUTSTAND_API_KEY }}
        run: python nakshiq-autoposter/autoposter.py ${{ steps.mode.outputs.args }}

      - name: Commit updated state
        run: |
          git config user.name  "Nakshiq Autoposter"
          git config user.email "autoposter@nakshiq.com"
          git add nakshiq-autoposter/state.json nakshiq-autoposter/autoposter.log
          git diff --staged --quiet || git commit -m "chore: autoposter state $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
