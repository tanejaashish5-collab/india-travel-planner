name: Nakshiq Autoposter

on:
  schedule:
    - cron: "30 3 * * *"   # 09:00 IST — publish today's post
    - cron: "30 8 * * *"   # 14:00 IST — content sync only
    - cron: "30 13 * * *"  # 19:00 IST — content sync only
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - force
          - sync-only
          - dry-run

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: nakshiq-autoposter/requirements.txt

      - name: Install dependencies
        run: pip install -r nakshiq-autoposter/requirements.txt

      - name: Set run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "args=--${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "03" ]; then
            echo "args=" >> $GITHUB_OUTPUT
          else
            echo "args=--sync-only" >> $GITHUB_OUTPUT
          fi

      - name: Run autoposter
        env:
          OUTSTAND_API_KEY: ${{ secrets.OUTSTAND_API_KEY }}
        run: python nakshiq-autoposter/autoposter.py ${{ steps.mode.outputs.args }}

      - name: Commit updated state
        run: |
          git config user.name  "Nakshiq Autoposter"
          git config user.email "autoposter@nakshiq.com"
          git add nakshiq-autoposter/state.json nakshiq-autoposter/autoposter.log
          git diff --staged --quiet || git commit -m "chore: autoposter state $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
