name: Nakshiq Autoposter

on:
  schedule:
    - cron: "0 3 * * *"    # 08:30 IST
    - cron: "30 3 * * *"   # 09:00 IST  ← primary post window
    - cron: "0 4 * * *"    # 09:30 IST
    - cron: "30 4 * * *"   # 10:00 IST
    - cron: "0 5 * * *"    # 10:30 IST  ← last fallback
    - cron: "0 7 * * 2,4,6"    # 12:30 IST Tue/Thu/Sat — tourist map
    - cron: "0 9 * * *"       # 14:30 IST daily — canva visual
    - cron: "30 5 * * *"      # 11:00 IST daily — reel slot 1
    - cron: "30 10 * * *"     # 16:00 IST daily — reel slot 2
    - cron: "30 14 * * *"     # 20:00 IST daily — reel slot 3
    - cron: "30 7 * * 1,3,5"   # 13:00 IST Mon/Wed/Fri — infographic
    - cron: "0 11 * * *"        # 21:00 AEST (9 PM) — yt short slot 1
    - cron: "0 2 * * *"         # 12:00 AEST (12 PM) — yt short slot 2
    - cron: "0 17 * * *"        # 03:00 AEST (3 AM) — yt short slot 3
    - cron: "0 18 * * *"        # 23:30 IST daily — analytics sync
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (leave blank for normal)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - force
          - sync-only
          - dry-run
          - tourist-map
          - tourist-map-force
          - canva-visual
          - canva-visual-force
          - reel
          - reel-force
          - infographic
          - infographic-force
          - yt-short
          - yt-short-force
          - analytics

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: nakshiq-autoposter/requirements.txt

      - name: Install ffmpeg (system package with drawtext/freetype)
        run: |
          sudo apt-get install -y -qq ffmpeg 2>/dev/null || {
            echo "Direct install failed, running apt-get update with 60s timeout..."
            timeout 60 sudo apt-get update -qq || true
            sudo apt-get install -y -qq ffmpeg
          }
          ffmpeg -filters 2>/dev/null | grep -c draw
          which ffmpeg

      - name: Install Python dependencies
        run: pip install -r nakshiq-autoposter/requirements.txt

      - name: Cache social image library
        uses: actions/cache@v4
        with:
          path: nakshiq-autoposter/social_image_library
          key: social-image-library-v1

      - name: Generate social image library (if not cached)
        run: |
          if [ ! -d "nakshiq-autoposter/social_image_library" ] || [ $(find nakshiq-autoposter/social_image_library -name "*.jpg" 2>/dev/null | wc -l) -lt 100 ]; then
            echo "Generating social image library..."
            python nakshiq-autoposter/dest_image_gen.py --limit 0
          else
            echo "Social image library cached ($(find nakshiq-autoposter/social_image_library -name '*.jpg' | wc -l) images)"
          fi

      - name: Set run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          TOTAL_MINS=$((10#$HOUR * 60 + 10#$MINUTE))
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          INPUT="${{ github.event.inputs.mode }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$INPUT" = "tourist-map-force" ]; then
              echo "args=--tourist-map --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --tourist-map --force"
            elif [ "$INPUT" = "canva-visual-force" ]; then
              echo "args=--canva-visual --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --canva-visual --force"
            elif [ "$INPUT" = "reel-force" ]; then
              echo "args=--reel --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --reel --force"
            elif [ "$INPUT" = "infographic-force" ]; then
              echo "args=--infographic --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --infographic --force"
            elif [ "$INPUT" = "yt-short-force" ]; then
              echo "args=--yt-short --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --yt-short --force"
            elif [ -n "$INPUT" ]; then
              echo "args=--${INPUT}" >> $GITHUB_OUTPUT
              echo "Manual mode: --${INPUT}"
            else
              echo "args=" >> $GITHUB_OUTPUT
              echo "Manual mode: normal (post)"
            fi
          elif [ "$TOTAL_MINS" -ge 450 ] && [ "$TOTAL_MINS" -lt 540 ] && echo "1 3 5" | grep -qw "$DOW"; then
            # UTC 07:30 on Mon/Wed/Fri → infographic (window: 450-539, 90 min for GH jitter)
            echo "args=--infographic" >> $GITHUB_OUTPUT
            echo "Scheduled INFOGRAPHIC mode (UTC ${HOUR}:${MINUTE}, DOW=${DOW})"
          elif [ "$TOTAL_MINS" -ge 540 ] && [ "$TOTAL_MINS" -lt 630 ]; then
            # UTC 09:00 daily → canva visual (window: 540-629)
            echo "args=--canva-visual" >> $GITHUB_OUTPUT
            echo "Scheduled CANVA VISUAL mode (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 420 ] && [ "$TOTAL_MINS" -lt 540 ] && echo "2 4 6" | grep -qw "$DOW"; then
            # UTC 07:00 on Tue/Thu/Sat → tourist map (window: 420-539, 120 min for GH jitter)
            echo "args=--tourist-map" >> $GITHUB_OUTPUT
            echo "Scheduled TOURIST MAP mode (UTC ${HOUR}:${MINUTE}, DOW=${DOW})"
          elif [ "$TOTAL_MINS" -ge 330 ] && [ "$TOTAL_MINS" -lt 420 ]; then
            # UTC 05:30 (11:00 IST) → reel slot 1 (window: 330-419)
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 1 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 630 ] && [ "$TOTAL_MINS" -lt 660 ]; then
            # UTC 10:30 (16:00 IST) → reel slot 2 (window: 630-659)
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 2 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 870 ] && [ "$TOTAL_MINS" -lt 1020 ]; then
            # UTC 14:30 (20:00 IST) → reel slot 3 (window: 870-1019, 150 min)
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 3 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 660 ] && [ "$TOTAL_MINS" -lt 870 ]; then
            # UTC 11:00 (21:00 AEST) → yt short slot 1 (window: 660-869, 210 min)
            echo "args=--yt-short" >> $GITHUB_OUTPUT
            echo "Scheduled YT SHORT slot 1 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 120 ] && [ "$TOTAL_MINS" -lt 180 ]; then
            # UTC 02:00 (12:00 AEST) → yt short slot 2 (window: 120-179)
            echo "args=--yt-short" >> $GITHUB_OUTPUT
            echo "Scheduled YT SHORT slot 2 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 1020 ] && [ "$TOTAL_MINS" -lt 1080 ]; then
            # UTC 17:00 (03:00 AEST) → yt short slot 3 (window: 1020-1079)
            echo "args=--yt-short" >> $GITHUB_OUTPUT
            echo "Scheduled YT SHORT slot 3 (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 1080 ] && [ "$TOTAL_MINS" -lt 1200 ]; then
            # UTC 18:00 (23:30 IST) → analytics sync (window: 1080-1199, 120 min)
            echo "args=--analytics" >> $GITHUB_OUTPUT
            echo "Scheduled ANALYTICS mode (UTC ${HOUR}:${MINUTE})"
          elif [ "$TOTAL_MINS" -ge 180 ] && [ "$TOTAL_MINS" -le 330 ]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "Scheduled POST mode (UTC ${HOUR}:${MINUTE})"
          else
            echo "args=--sync-only" >> $GITHUB_OUTPUT
            echo "Scheduled SYNC mode (UTC ${HOUR}:${MINUTE})"
          fi

      - name: Run autoposter
        env:
          OUTSTAND_API_KEY: ${{ secrets.OUTSTAND_API_KEY }}
        run: python nakshiq-autoposter/autoposter.py ${{ steps.mode.outputs.args }}

      - name: Commit updated state
        run: |
          git config user.name  "Nakshiq Autoposter"
          git config user.email "autoposter@nakshiq.com"
          git add nakshiq-autoposter/state.json nakshiq-autoposter/autoposter.log nakshiq-autoposter/analytics.json
          git diff --staged --quiet || git commit -m "chore: autoposter state $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Retry push with rebase to handle concurrent pushes (e.g. manual commits)
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded (attempt $attempt)"
              break
            fi
            echo "Push failed (attempt $attempt), pulling with rebase and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
