name: Nakshiq Autoposter

on:
  schedule:
    # Run every 30 minutes from 03:00–05:00 UTC (covers 08:30–10:30 IST)
    # This ensures posting happens even if GitHub delays the job by up to 90 mins
    - cron: "0 3 * * *"
    - cron: "30 3 * * *"
    - cron: "0 4 * * *"
    - cron: "30 4 * * *"
    - cron: "0 5 * * *"
    # Afternoon sync: 08:30 UTC = 14:00 IST
    - cron: "30 8 * * *"
    # Evening sync: 13:30 UTC = 19:00 IST
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - force
          - sync-only
          - dry-run

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: nakshiq-autoposter/requirements.txt

      - name: Install dependencies
        run: pip install -r nakshiq-autoposter/requirements.txt

      - name: Set run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          TOTAL_MINS=$((10#$HOUR * 60 + 10#$MINUTE))
          # Morning window: 03:00–05:30 UTC (08:30–11:00 IST) → POST
          # Only post if not already posted today (script handles dedup via state.json)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "args=--${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$TOTAL_MINS" -ge 180 ] && [ "$TOTAL_MINS" -le 330 ]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "Running in POST mode (UTC ${HOUR}:${MINUTE})"
          else
            echo "args=--sync-only" >> $GITHUB_OUTPUT
            echo "Running in SYNC-ONLY mode (UTC ${HOUR}:${MINUTE})"
          fi

      - name: Run autoposter
        env:
          OUTSTAND_API_KEY: ${{ secrets.OUTSTAND_API_KEY }}
        run: python nakshiq-autoposter/autoposter.py ${{ steps.mode.outputs.args }}

      - name: Commit updated state
        run: |
          git config user.name  "Nakshiq Autoposter"
          git config user.email "autoposter@nakshiq.com"
          git add nakshiq-autoposter/state.json nakshiq-autoposter/autoposter.log
          git diff --staged --quiet || git commit -m "chore: autoposter state $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
