name: Nakshiq Autoposter

on:
  schedule:
    # ── Optimized schedule (all times IST, 2hr+ gaps) ──────────────
    # Morning post: 09:00 IST (03:30 UTC) — daily IG+FB
    - cron: "30 3 * * *"
    # YT Short slot 1: 10:00 IST (04:30 UTC) — daily YT only
    - cron: "30 4 * * *"
    # Reel slot 1: 11:00 IST (05:30 UTC) — daily IG+FB
    - cron: "30 5 * * *"
    # Visual slot: 13:00 IST (07:30 UTC) — daily IG+FB
    #   Mon/Wed → moat, Tue/Thu → tourist map, Fri → infographic,
    #   Sat → canva, Sun → pomelli (rotation in mode detection)
    - cron: "30 7 * * *"
    # Reel-map: 15:30 IST (10:00 UTC) — daily IG+FB+YT
    - cron: "0 10 * * *"
    # YT Short slot 2: 17:00 IST (11:30 UTC) — daily YT only
    - cron: "30 11 * * *"
    # Evening post: 18:30 IST (13:00 UTC) — daily IG+FB
    - cron: "0 13 * * *"
    # Reel slot 2: 20:30 IST (15:00 UTC) — daily IG+FB
    - cron: "0 15 * * *"
    # Analytics sync: 23:30 IST (18:00 UTC) — internal
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (leave blank for normal)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - force
          - sync-only
          - dry-run
          - evening
          - evening-force
          - moat
          - moat-force
          - tourist-map
          - tourist-map-force
          - canva-visual
          - canva-visual-force
          - reel
          - reel-force
          - infographic
          - infographic-force
          - pomelli-visual
          - pomelli-visual-force
          - reel-map
          - reel-map-force
          - yt-short
          - yt-short-force
          - analytics

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: nakshiq-autoposter/requirements.txt

      - name: Install ffmpeg (system package with drawtext/freetype)
        run: |
          sudo apt-get install -y -qq ffmpeg 2>/dev/null || {
            echo "Direct install failed, running apt-get update with 60s timeout..."
            timeout 60 sudo apt-get update -qq || true
            sudo apt-get install -y -qq ffmpeg
          }
          ffmpeg -filters 2>/dev/null | grep -c draw
          which ffmpeg

      - name: Install Python dependencies
        run: pip install -r nakshiq-autoposter/requirements.txt

      - name: Sync latest autoposter state from autoposter-state branch
        # State files (state.json / autoposter.log / analytics.json) live on the
        # `autoposter-state` side branch so they don't trigger Vercel rebuilds on
        # main. Pull the latest state into the main worktree before the autoposter
        # runs so it sees yesterday's already-posted content.
        run: |
          if git ls-remote --exit-code --heads origin autoposter-state >/dev/null 2>&1; then
            git fetch origin autoposter-state --depth=1
            git checkout origin/autoposter-state -- \
              nakshiq-autoposter/state.json \
              nakshiq-autoposter/autoposter.log \
              nakshiq-autoposter/analytics.json 2>/dev/null || true
            echo "Synced state from autoposter-state branch"
          else
            echo "autoposter-state branch not on origin yet — using state from main checkout (first run)"
          fi

      - name: Cache social image library
        uses: actions/cache@v4
        with:
          path: nakshiq-autoposter/social_image_library
          key: social-image-library-v1

      - name: Generate social image library (if not cached)
        run: |
          if [ ! -d "nakshiq-autoposter/social_image_library" ] || [ $(find nakshiq-autoposter/social_image_library -name "*.jpg" 2>/dev/null | wc -l) -lt 100 ]; then
            echo "Generating social image library..."
            python nakshiq-autoposter/dest_image_gen.py --limit 0
          else
            echo "Social image library cached ($(find nakshiq-autoposter/social_image_library -name '*.jpg' | wc -l) images)"
          fi

      - name: Set run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          TOTAL_MINS=$((10#$HOUR * 60 + 10#$MINUTE))
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          INPUT="${{ github.event.inputs.mode }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$INPUT" = "evening-force" ]; then
              echo "args=--evening --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --evening --force"
            elif [ "$INPUT" = "moat-force" ]; then
              echo "args=--moat --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --moat --force"
            elif [ "$INPUT" = "tourist-map-force" ]; then
              echo "args=--tourist-map --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --tourist-map --force"
            elif [ "$INPUT" = "canva-visual-force" ]; then
              echo "args=--canva-visual --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --canva-visual --force"
            elif [ "$INPUT" = "pomelli-visual-force" ]; then
              echo "args=--pomelli-visual --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --pomelli-visual --force"
            elif [ "$INPUT" = "reel-force" ]; then
              echo "args=--reel --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --reel --force"
            elif [ "$INPUT" = "reel-map-force" ]; then
              echo "args=--reel-map --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --reel-map --force"
            elif [ "$INPUT" = "infographic-force" ]; then
              echo "args=--infographic --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --infographic --force"
            elif [ "$INPUT" = "yt-short-force" ]; then
              echo "args=--yt-short --force" >> $GITHUB_OUTPUT
              echo "Manual mode: --yt-short --force"
            elif [ -n "$INPUT" ]; then
              echo "args=--${INPUT}" >> $GITHUB_OUTPUT
              echo "Manual mode: --${INPUT}"
            else
              echo "args=" >> $GITHUB_OUTPUT
              echo "Manual mode: normal (post)"
            fi
          # ── Optimized schedule: 9 daily slots, 2hr+ gaps, all IST ──
          # 09:00 IST = UTC 03:30 → morning post (window: 200-280)
          elif [ "$TOTAL_MINS" -ge 200 ] && [ "$TOTAL_MINS" -lt 280 ]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "Scheduled POST mode · 09:00 IST (UTC ${HOUR}:${MINUTE})"

          # 10:00 IST = UTC 04:30 → YT Short slot 1 (window: 260-340)
          elif [ "$TOTAL_MINS" -ge 260 ] && [ "$TOTAL_MINS" -lt 340 ]; then
            echo "args=--yt-short" >> $GITHUB_OUTPUT
            echo "Scheduled YT SHORT slot 1 · 10:00 IST (UTC ${HOUR}:${MINUTE})"

          # 11:00 IST = UTC 05:30 → Reel slot 1 (window: 320-400)
          elif [ "$TOTAL_MINS" -ge 320 ] && [ "$TOTAL_MINS" -lt 400 ]; then
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 1 · 11:00 IST (UTC ${HOUR}:${MINUTE})"

          # 13:00 IST = UTC 07:30 → Visual slot (window: 440-520)
          #   Mon/Wed=moat, Tue/Thu=tourist-map, Fri=infographic, Sat=canva, Sun=pomelli
          elif [ "$TOTAL_MINS" -ge 440 ] && [ "$TOTAL_MINS" -lt 520 ]; then
            if echo "1 3" | grep -qw "$DOW"; then
              echo "args=--moat" >> $GITHUB_OUTPUT
              echo "Scheduled MOAT · 13:00 IST Mon/Wed (UTC ${HOUR}:${MINUTE})"
            elif echo "2 4" | grep -qw "$DOW"; then
              echo "args=--tourist-map" >> $GITHUB_OUTPUT
              echo "Scheduled TOURIST MAP · 13:00 IST Tue/Thu (UTC ${HOUR}:${MINUTE})"
            elif [ "$DOW" = "5" ]; then
              echo "args=--infographic" >> $GITHUB_OUTPUT
              echo "Scheduled INFOGRAPHIC · 13:00 IST Fri (UTC ${HOUR}:${MINUTE})"
            elif [ "$DOW" = "6" ]; then
              echo "args=--canva-visual" >> $GITHUB_OUTPUT
              echo "Scheduled CANVA VISUAL · 13:00 IST Sat (UTC ${HOUR}:${MINUTE})"
            else
              echo "args=--pomelli-visual" >> $GITHUB_OUTPUT
              echo "Scheduled POMELLI VISUAL · 13:00 IST Sun (UTC ${HOUR}:${MINUTE})"
            fi

          # 15:30 IST = UTC 10:00 → Reel-map (window: 590-660) — IG+FB+YT
          elif [ "$TOTAL_MINS" -ge 590 ] && [ "$TOTAL_MINS" -lt 660 ]; then
            echo "args=--reel-map" >> $GITHUB_OUTPUT
            echo "Scheduled REEL-MAP · 15:30 IST (UTC ${HOUR}:${MINUTE})"

          # 17:00 IST = UTC 11:30 → YT Short slot 2 (window: 680-760)
          elif [ "$TOTAL_MINS" -ge 680 ] && [ "$TOTAL_MINS" -lt 760 ]; then
            echo "args=--yt-short" >> $GITHUB_OUTPUT
            echo "Scheduled YT SHORT slot 2 · 17:00 IST (UTC ${HOUR}:${MINUTE})"

          # 18:30 IST = UTC 13:00 → Evening post (window: 770-860)
          elif [ "$TOTAL_MINS" -ge 770 ] && [ "$TOTAL_MINS" -lt 860 ]; then
            echo "args=--evening" >> $GITHUB_OUTPUT
            echo "Scheduled EVENING · 18:30 IST (UTC ${HOUR}:${MINUTE})"

          # 20:30 IST = UTC 15:00 → Reel slot 2 (window: 890-970)
          elif [ "$TOTAL_MINS" -ge 890 ] && [ "$TOTAL_MINS" -lt 970 ]; then
            echo "args=--reel" >> $GITHUB_OUTPUT
            echo "Scheduled REEL slot 2 · 20:30 IST (UTC ${HOUR}:${MINUTE})"

          # 23:30 IST = UTC 18:00 → Analytics sync (window: 1070-1200)
          elif [ "$TOTAL_MINS" -ge 1070 ] && [ "$TOTAL_MINS" -lt 1200 ]; then
            echo "args=--analytics" >> $GITHUB_OUTPUT
            echo "Scheduled ANALYTICS · 23:30 IST (UTC ${HOUR}:${MINUTE})"

          else
            echo "args=--sync-only" >> $GITHUB_OUTPUT
            echo "Off-schedule trigger, sync only (UTC ${HOUR}:${MINUTE})"
          fi

      - name: Run autoposter
        env:
          OUTSTAND_API_KEY: ${{ secrets.OUTSTAND_API_KEY }}
        run: python nakshiq-autoposter/autoposter.py ${{ steps.mode.outputs.args }}

      - name: Commit updated state to autoposter-state branch
        # Push the autoposter's state files to the side branch `autoposter-state`,
        # not to main. main only receives real code changes — Vercel deploys from
        # main, so this eliminates ~16 chore-driven rebuilds per day. A separate
        # worktree keeps the main checkout untouched.
        run: |
          set -e
          git config user.name  "Nakshiq Autoposter"
          git config user.email "autoposter@nakshiq.com"

          # 1. Snapshot autoposter's freshly-written state files
          mkdir -p /tmp/autoposter-snap
          [ -f nakshiq-autoposter/state.json ]     && cp nakshiq-autoposter/state.json     /tmp/autoposter-snap/state.json     || true
          [ -f nakshiq-autoposter/autoposter.log ] && cp nakshiq-autoposter/autoposter.log /tmp/autoposter-snap/autoposter.log || true
          [ -f nakshiq-autoposter/analytics.json ] && cp nakshiq-autoposter/analytics.json /tmp/autoposter-snap/analytics.json || true

          # 2. Ensure autoposter-state branch exists on origin (bootstrap on first run)
          if ! git ls-remote --exit-code --heads origin autoposter-state >/dev/null 2>&1; then
            echo "Bootstrapping autoposter-state branch from main..."
            git push origin HEAD:refs/heads/autoposter-state
          fi

          # 3. Fetch + add a worktree for the side branch
          git fetch origin autoposter-state --depth=1
          rm -rf /tmp/autoposter-state-worktree
          git worktree add /tmp/autoposter-state-worktree autoposter-state

          # 4. Drop the snapshot into the worktree
          mkdir -p /tmp/autoposter-state-worktree/nakshiq-autoposter
          cp /tmp/autoposter-snap/state.json     /tmp/autoposter-state-worktree/nakshiq-autoposter/state.json     2>/dev/null || true
          cp /tmp/autoposter-snap/autoposter.log /tmp/autoposter-state-worktree/nakshiq-autoposter/autoposter.log 2>/dev/null || true
          cp /tmp/autoposter-snap/analytics.json /tmp/autoposter-state-worktree/nakshiq-autoposter/analytics.json 2>/dev/null || true

          # 5. Commit + push from the worktree
          pushd /tmp/autoposter-state-worktree
          git add nakshiq-autoposter/state.json nakshiq-autoposter/autoposter.log nakshiq-autoposter/analytics.json
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: autoposter state $(date -u +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              if git push origin autoposter-state; then
                echo "Push succeeded (attempt $attempt)"
                break
              fi
              echo "Push failed (attempt $attempt), pulling with rebase and retrying..."
              git pull --rebase origin autoposter-state || true
              sleep $((attempt * 2))
            done
          fi
          popd

          # 6. Cleanup
          git worktree remove --force /tmp/autoposter-state-worktree || true
