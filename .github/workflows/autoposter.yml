name: Nakshiq Autoposter

on:
  schedule:
    - cron: "0 3 * * *"    # 08:30 IST
    - cron: "30 3 * * *"   # 09:00 IST  ← primary post window
    - cron: "0 4 * * *"    # 09:30 IST
    - cron: "30 4 * * *"   # 10:00 IST
    - cron: "0 5 * * *"    # 10:30 IST  ← last fallback
    - cron: "30 8 * * *"   # 14:00 IST  sync only
    - cron: "30 13 * * *"  # 19:00 IST  sync only
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (leave blank for normal)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - force
          - sync-only
          - dry-run

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: nakshiq-autoposter/requirements.txt

      - name: Install dependencies
        run: pip install -r nakshiq-autoposter/requirements.txt

      - name: Set run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          TOTAL_MINS=$((10#$HOUR * 60 + 10#$MINUTE))
          INPUT="${{ github.event.inputs.mode }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$INPUT" ]; then
              echo "args=--${INPUT}" >> $GITHUB_OUTPUT
              echo "Manual mode: --${INPUT}"
            else
              echo "args=" >> $GITHUB_OUTPUT
              echo "Manual mode: normal (post)"
            fi
          elif [ "$TOTAL_MINS" -ge 180 ] && [ "$TOTAL_MINS" -le 330 ]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "Scheduled POST mode (UTC ${HOUR}:${MINUTE})"
          else
            echo "args=--sync-only" >> $GITHUB_OUTPUT
            echo "Scheduled SYNC mode (UTC ${HOUR}:${MINUTE})"
          fi

      - name: Run autoposter
        env:
          OUTSTAND_API_KEY: ${{ secrets.OUTSTAND_API_KEY }}
        run: python nakshiq-autoposter/autoposter.py ${{ steps.mode.outputs.args }}

      - name: Commit updated state
        run: |
          git config user.name  "Nakshiq Autoposter"
          git config user.email "autoposter@nakshiq.com"
          git add nakshiq-autoposter/state.json nakshiq-autoposter/autoposter.log
          git diff --staged --quiet || git commit -m "chore: autoposter state $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
