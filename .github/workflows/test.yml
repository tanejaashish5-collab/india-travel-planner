name: Test & Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - "nakshiq-autoposter/**"
      - "*.md"
      - "images/**"
      - "videos/**"
  workflow_dispatch:

env:
  BASE_URL: https://www.nakshiq.com

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (warn only — pre-existing issues)
        run: npm run lint || true
      - run: npm run type-check

  playwright-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - name: Run functional E2E tests
        run: npx playwright test --project=mobile --project=desktop --grep-invert="Visual"
        env:
          BASE_URL: ${{ env.BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - name: Run visual regression tests
        run: npx playwright test visual --project=mobile --project=desktop --update-snapshots
        env:
          BASE_URL: ${{ env.BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: |
            tests/e2e/visual.spec.ts-snapshots/
            test-results/
          retention-days: 14

  lighthouse-audit:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Lighthouse CI
        run: npx lhci autorun
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 7
